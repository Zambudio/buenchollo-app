services:
  buenchollo-api:
    build: .
    container_name: buenchollo-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    restart: always
    volumes:
      - .:/app
    # 1) `alembic upgrade head` aplica cualquier migración pendiente al arrancar.
    #    Idempotente: si la BD ya está al día, no hace nada.
    # 2) Si alembic falla (BD caída, migración rota), el contenedor NO arranca.
    #    Esto es intencional: mejor no arrancar que correr con esquema obsoleto.
    # 3) Si NO quieres este comportamiento (p. ej. en local sin permisos),
    #    cambia a:  command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Cloudflare Tunnel — expone la API en api.buenchollotech.com SIN abrir puertos
  # ni depender de la IP pública (conexión saliente). Por estar en este mismo
  # compose, alcanza la API por el nombre de servicio: http://buenchollo-api:8000
  # (ese es el destino que se configura en el Public Hostname del túnel).
  # Requisito: CLOUDFLARE_TUNNEL_TOKEN en el .env del NAS (token del túnel creado
  # en Zero Trust → Tunnels). Con túnel NO se necesita DDNS ni abrir el 443.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: buenchollo-cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - buenchollo-api
