services:
  buenchollo-api:
    build: .
    container_name: buenchollo-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      # El scheduler corre en su propio contenedor (buenchollo-scheduler, abajo)
      # para no duplicar jobs entre los --workers de uvicorn (M-07/TD-11).
      - SCHEDULER_ENABLED=false
    restart: always
    volumes:
      - .:/app
    # 1) `alembic upgrade head` aplica cualquier migración pendiente al arrancar.
    #    Idempotente: si la BD ya está al día, no hace nada.
    # 2) Si alembic falla (BD caída, migración rota), el contenedor NO arranca.
    #    Esto es intencional: mejor no arrancar que correr con esquema obsoleto.
    # 3) Si NO quieres este comportamiento (p. ej. en local sin permisos),
    #    cambia a:  command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  # ── Scheduler dedicado (TD-11 desbloqueado 2026-07-18) ──────────────────────
  # Necesario porque buenchollo-api corre con --workers 2: sin esto, los jobs
  # periódicos (mark_expired, clean) se ejecutarían una vez por worker (M-07).
  buenchollo-scheduler:
    build: .
    container_name: buenchollo-scheduler
    env_file:
      - .env
    environment:
      - SCHEDULER_ENABLED=true
    restart: always
    depends_on:
      - buenchollo-api
    volumes:
      - .:/app
    command: python -m app.run_scheduler
    # El HEALTHCHECK del Dockerfile comprueba http://localhost:8000/health,
    # pensado para buenchollo-api (uvicorn). Este contenedor no expone HTTP
    # (solo corre el scheduler), así que ese check siempre falla y Docker lo
    # marca "unhealthy" aunque el proceso esté bien. Lo desactivamos aquí.
    healthcheck:
      disable: true

  # Cloudflare Tunnel — expone la API en api.buenchollotech.com SIN abrir puertos
  # ni depender de la IP pública (conexión saliente). Por estar en este mismo
  # compose, alcanza la API por el nombre de servicio: http://buenchollo-api:8000
  # (ese es el destino que se configura en el Public Hostname del túnel).
  # Requisito: TUNNEL_TOKEN en el .env del NAS (token del túnel creado en
  # Zero Trust → Tunnels). cloudflared lee la variable TUNNEL_TOKEN del entorno.
  # Usamos env_file (no `environment: ${...}`) porque Synology Container Manager
  # no interpola variables ${...} en el YAML, pero sí inyecta env_file.
  # Con túnel NO se necesita DDNS ni abrir el 443.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: buenchollo-cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    env_file:
      - .env
    depends_on:
      - buenchollo-api
