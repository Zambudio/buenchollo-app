services:
  buenchollo-api:
    build: .
    container_name: buenchollo-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    restart: always
    volumes:
      - .:/app
    # 1) `alembic upgrade head` aplica cualquier migración pendiente al arrancar.
    #    Idempotente: si la BD ya está al día, no hace nada.
    # 2) Si alembic falla (BD caída, migración rota), el contenedor NO arranca.
    #    Esto es intencional: mejor no arrancar que correr con esquema obsoleto.
    # 3) Si NO quieres este comportamiento (p. ej. en local sin permisos),
    #    cambia a:  command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Cloudflare DDNS — mantiene api.<dominio> apuntando a la IP pública del NAS
  # aunque el ISP la cambie (IP dinámica). Descomentar cuando tengas:
  #   1) El dominio en Cloudflare (zona activa).
  #   2) Un token de API "Edit zone DNS" en .env como CLOUDFLARE_DDNS_TOKEN.
  #   3) Un registro A "api" creado en Cloudflare (con proxy activado).
  # Ajusta ZONE/SUBDOMAIN a tu dominio real.
  # cloudflare-ddns:
  #   image: oznu/cloudflare-ddns:latest
  #   container_name: buenchollo-ddns
  #   restart: always
  #   environment:
  #     - API_KEY=${CLOUDFLARE_DDNS_TOKEN}
  #     - ZONE=tudominio.com
  #     - SUBDOMAIN=api
  #     - PROXIED=true
