# Dependabot — actualizaciones semanales agrupadas por ecosistema.
# Una PR por update group para no ahogar el inbox con N PRs sueltas.

version: 2
updates:
  - package-ecosystem: pip
    directory: /buenchollo-api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: [minor, patch]
    ignore:
      # No proponer saltos de versión MAYOR (rompen y generan PRs en rojo).
      # Se siguen recibiendo minor/patch (agrupados) y parches de seguridad.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /buenchollo-web
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
      radix:
        patterns: ["@radix-ui/*"]
      tanstack:
        patterns: ["@tanstack/*"]
    ignore:
      # No proponer saltos de versión MAYOR (rompen el build y dejan PRs en rojo).
      # Se siguen recibiendo minor/patch (agrupados) y parches de seguridad.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
