name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buenchollo-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: buenchollo-api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest (unit only)
        # Excluimos tests marcados `integration` porque requieren un Postgres
        # real (Supabase) que no levantamos en CI. Los tests de integración
        # se ejecutan en local antes de cada release (ver docs/SMOKE_TEST.md).
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: dummy-service-role-key
          SUPABASE_JWT_SECRET: dummy-jwt-secret
          CORS_ORIGINS: '["*"]'
        run: pytest -q -m "not integration"

  frontend:
    name: Frontend (typecheck + lint + unit/integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buenchollo-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: buenchollo-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Vitest (unit + integration) con coverage
        run: npm run test:coverage

      - name: Subir reporte de coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: buenchollo-web/coverage/
          retention-days: 7

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buenchollo-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: buenchollo-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Instalar navegadores Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Ejecutar tests E2E
        # VITE_SUPABASE_* dummy: el cliente Supabase tira al construirse si
        # faltan estas env vars. Con dummies puede inicializarse, getSession
        # devuelve null (no hay nada en localStorage) y los tests del guard
        # de admin (/admin → /login) funcionan. NO se intenta autenticar
        # contra Supabase real; cualquier fetch falla → tratado como sin
        # sesión, que es justo lo que queremos en E2E sin credenciales.
        env:
          VITE_SUPABASE_URL: https://dummy.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: dummy-anon-key-for-tests
          VITE_API_URL: http://localhost:9999
        run: npm run test:e2e

      - name: Subir reporte HTML de Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            buenchollo-web/playwright-report/
            buenchollo-web/test-results/
          retention-days: 7

  security-audit:
    name: Security audit (deps + secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks necesita el historial para escanear todos los commits.
          fetch-depth: 0

      # ── Python: pip-audit sobre las deps de producción ────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: buenchollo-api/requirements.txt

      - name: Instalar pip-audit
        run: pip install pip-audit

      - name: pip-audit (backend deps)
        # --strict: falla si encuentra CUALQUIER vulnerabilidad. Si en el
        # futuro se acepta una excepción documentada, usar --ignore-vuln <ID>.
        run: pip-audit -r buenchollo-api/requirements.txt --strict

      # ── Node: npm audit sobre deps de producción ──────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: buenchollo-web/package-lock.json

      - name: Instalar deps frontend
        working-directory: buenchollo-web
        run: npm ci

      - name: npm audit (sólo deps de producción, fallar en high/critical)
        # Ignoramos dev-tooling (wrangler, miniflare, etc. con CVEs moderate
        # que no afectan al runtime).
        working-directory: buenchollo-web
        run: npm audit --omit=dev --audit-level=high

      # ── gitleaks: detectar secretos hardcoded en el código y el historial ─
      - name: Escaneo de secretos con gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
